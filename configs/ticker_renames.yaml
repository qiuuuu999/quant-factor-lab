# Ticker rename / alias map for the S&P 500 universe.
#
# `renames` records companies that stayed publicly listed but changed their
# ticker symbol. Prices must be *downloaded* under the current symbol (Yahoo
# only serves history there) while *queries* under the historical symbol must
# still resolve. Chains are followed transitively (e.g. VIAB -> VIAC -> PARA).
#
# `delisted` records companies that left the index with NO surviving symbol
# (acquisitions, take-privates, bankruptcies). They are expected to be missing
# from a free data source; listing them here lets the quality report label them
# as "expected missing" rather than fixable.
#
# Some renames are auto-inferred from the Wikipedia change log (same company
# name added under a new ticker the same day it was removed under the old one);
# those need not be listed here. This file covers the cases inference misses.

renames:
  - {old: FB,    new: META, date: 2022-06-09, note: "Facebook -> Meta Platforms"}
